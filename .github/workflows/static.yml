<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>会员查询 · PandaSaving</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,400;1,300&family=Noto+Sans+SC:wght@400;500&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --cream: #faf8f4;
  --warm: #f2ede4;
  --border: #e0d9ce;
  --border2: #c8bfb0;
  --ink: #1c1a16;
  --ink2: #6b6459;
  --ink3: #a89e92;
  --green: #2d5a3d;
  --green-light: #edf5f0;
  --green-mid: #c8dfd0;
  --amber: #8b5e2a;
  --amber-light: #fdf3e7;
  --amber-mid: #e8c99a;
  --serif: 'Fraunces', Georgia, serif;
  --sans: 'Noto Sans SC', sans-serif;
}

html, body {
  min-height: 100vh;
  background: var(--cream);
  font-family: var(--sans);
  color: var(--ink);
}

body {
  display: grid;
  grid-template-rows: auto 1fr auto;
  min-height: 100vh;
}

/* Header */
header {
  border-bottom: 1px solid var(--border);
  padding: 18px 40px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: var(--cream);
}

.logo {
  font-family: var(--serif);
  font-size: 20px;
  font-weight: 300;
  color: var(--ink);
  letter-spacing: 0.01em;
}

.logo span {
  font-style: italic;
  color: var(--green);
}

.header-tag {
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--ink3);
  border: 1px solid var(--border);
  padding: 4px 10px;
  border-radius: 20px;
}

/* Main */
main {
  display: flex;
  align-items: flex-start;
  justify-content: center;
  padding: 60px 24px 80px;
}

.panel {
  width: 100%;
  max-width: 480px;
}

.panel-title {
  font-family: var(--serif);
  font-size: 36px;
  font-weight: 300;
  line-height: 1.2;
  color: var(--ink);
  margin-bottom: 6px;
  letter-spacing: -0.01em;
}

.panel-title em {
  font-style: italic;
  color: var(--green);
}

.panel-sub {
  font-size: 14px;
  color: var(--ink2);
  margin-bottom: 36px;
  line-height: 1.6;
}

/* Search */
.field-label {
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--ink3);
  margin-bottom: 8px;
  display: block;
}

.input-wrap {
  position: relative;
  margin-bottom: 12px;
}

input[type="email"] {
  width: 100%;
  background: #fff;
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 14px 44px 14px 16px;
  font-size: 15px;
  font-family: var(--sans);
  color: var(--ink);
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
  -webkit-appearance: none;
}

input[type="email"]::placeholder { color: var(--ink3); }

input[type="email"]:focus {
  border-color: var(--green);
  box-shadow: 0 0 0 3px rgba(45,90,61,0.08);
}

.clear-btn {
  position: absolute;
  right: 12px; top: 50%;
  transform: translateY(-50%);
  background: none; border: none;
  color: var(--ink3); cursor: pointer;
  font-size: 20px; line-height: 1;
  display: none; padding: 2px 4px;
  border-radius: 4px;
  transition: color 0.15s;
}
.clear-btn:hover { color: var(--ink2); }

.btn-query {
  width: 100%;
  background: var(--green);
  color: #fff;
  border: none;
  border-radius: 8px;
  padding: 14px;
  font-size: 15px;
  font-weight: 500;
  font-family: var(--sans);
  cursor: pointer;
  letter-spacing: 0.02em;
  transition: background 0.15s, transform 0.1s;
  position: relative;
  overflow: hidden;
}
.btn-query::after {
  content: '';
  position: absolute;
  inset: 0;
  background: rgba(255,255,255,0);
  transition: background 0.15s;
}
.btn-query:hover { background: #224831; }
.btn-query:active { transform: scale(0.99); }
.btn-query:disabled {
  background: var(--border);
  color: var(--ink3);
  cursor: not-allowed;
  transform: none;
}

/* Result */
#result { margin-top: 24px; }

.loading {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 20px;
  background: #fff;
  border: 1px solid var(--border);
  border-radius: 10px;
  font-size: 14px;
  color: var(--ink2);
}

.spinner {
  width: 18px; height: 18px;
  border: 2px solid var(--border);
  border-top-color: var(--green);
  border-radius: 50%;
  animation: spin 0.6s linear infinite;
  flex-shrink: 0;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* Result cards */
.card {
  background: #fff;
  border-radius: 10px;
  border: 1px solid var(--border);
  overflow: hidden;
  animation: rise 0.28s cubic-bezier(0.22,1,0.36,1);
}
@keyframes rise {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}

.card-head {
  padding: 20px 22px;
  display: flex;
  align-items: center;
  gap: 14px;
  border-bottom: 1px solid var(--border);
}

.card.is-member .card-head   { background: var(--green-light); border-bottom-color: var(--green-mid); }
.card.not-member .card-head  { background: var(--amber-light); border-bottom-color: var(--amber-mid); }
.card.not-found .card-head   { background: var(--warm); }

.avatar {
  width: 44px; height: 44px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--serif);
  font-size: 18px;
  font-weight: 300;
  flex-shrink: 0;
}
.card.is-member .avatar  { background: var(--green-mid); color: var(--green); }
.card.not-member .avatar { background: var(--amber-mid); color: var(--amber); }
.card.not-found .avatar  { background: var(--border); color: var(--ink3); }

.card-head-info { flex: 1; min-width: 0; }

.card-status {
  font-size: 15px;
  font-weight: 500;
  margin-bottom: 2px;
}
.card.is-member .card-status  { color: var(--green); }
.card.not-member .card-status { color: var(--amber); }
.card.not-found .card-status  { color: var(--ink2); }

.card-email {
  font-size: 13px;
  color: var(--ink2);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.status-dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  flex-shrink: 0;
}
.card.is-member .status-dot  { background: var(--green); }
.card.not-member .status-dot { background: var(--amber); }
.card.not-found .status-dot  { background: var(--ink3); }

/* Info rows */
.card-body { padding: 4px 0; }

.row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 12px 22px;
  border-bottom: 1px solid var(--border);
  font-size: 13.5px;
  gap: 16px;
}
.row:last-child { border-bottom: none; }

.row-label { color: var(--ink2); font-size: 13px; flex-shrink: 0; }
.row-value { color: var(--ink); font-weight: 500; text-align: right; }

.plan-pill {
  display: inline-block;
  background: var(--green-light);
  color: var(--green);
  border: 1px solid var(--green-mid);
  border-radius: 20px;
  padding: 3px 12px;
  font-size: 13px;
  font-weight: 500;
}

.err-box {
  background: #fdf2f2;
  border: 1px solid #f0c8c8;
  border-radius: 10px;
  padding: 14px 18px;
  color: #a02020;
  font-size: 14px;
  display: flex;
  align-items: center;
  gap: 10px;
  animation: rise 0.2s ease;
}

/* Footer */
footer {
  border-top: 1px solid var(--border);
  padding: 16px 40px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.footer-text {
  font-size: 12px;
  color: var(--ink3);
}
</style>
</head>
<body>

<header>
  <div class="logo">Panda<span>Saving</span></div>
  <div class="header-tag">内部工具</div>
</header>

<main>
  <div class="panel">
    <h1 class="panel-title">会员<em>资格</em>查询</h1>
    <p class="panel-sub">输入用户邮箱，即时查询其付费会员状态</p>

    <label class="field-label" for="emailInput">用户邮箱</label>
    <div class="input-wrap">
      <input type="email" id="emailInput" placeholder="user@example.com"
        oninput="onInput()" onkeydown="if(event.key==='Enter')query()" autocomplete="off" />
      <button class="clear-btn" id="clearBtn" onclick="clearInput()" tabindex="-1">×</button>
    </div>

    <button class="btn-query" id="queryBtn" onclick="query()">查询会员状态</button>

    <div id="result"></div>
  </div>
</main>

<footer>
  <span class="footer-text">PandaSaving · 仅限内部使用</span>
  <span class="footer-text" id="queryTime"></span>
</footer>

<script>
const WORKER_URL = "https://wild-firefly-c449member-query.brookeout.workers.dev";

function onInput() {
  const btn = document.getElementById("clearBtn");
  if (!btn) return;
  const val = document.getElementById('emailInput').value;
  btn.style.display = val ? "block" : "none";
  document.getElementById('result').innerHTML = '';
}

function clearInput() {
  const emailInput = document.getElementById('emailInput');
  const clearBtn = document.getElementById('clearBtn');
  const result = document.getElementById('result');
  if (emailInput) emailInput.value = '';
  if (clearBtn) clearBtn.style.display = 'none';
  if (result) result.innerHTML = '';
  if (emailInput) emailInput.focus();
}

function formatDate(iso) {
  if (!iso) return '—';
  return new Date(iso).toLocaleDateString('zh-CN', { year: 'numeric', month: 'long', day: 'numeric' });
}

function getInitial(name, email) {
  if (name) return name[0].toUpperCase();
  return email ? email[0].toUpperCase() : '?';
}

async function query() {
  const email = document.getElementById('emailInput').value.trim();
  if (!email) return;

  if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
    document.getElementById('result').innerHTML = `<div class="err-box">⚠ 请输入正确的邮箱格式</div>`;
    return;
  }

  document.getElementById('queryBtn').disabled = true;
  document.getElementById('result').innerHTML = `
    <div class="loading"><div class="spinner"></div>正在查询…</div>`;

  try {
    const res = await fetch(`${WORKER_URL}?email=${encodeURIComponent(email)}`);
    const data = await res.json();
    if (data.error) throw new Error(data.error);

    const now = new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    document.getElementById('queryTime').textContent = `最近查询 ${now}`;

    if (!data.found) {
      document.getElementById('result').innerHTML = `
        <div class="card not-found">
          <div class="card-head">
            <div class="avatar">?</div>
            <div class="card-head-info">
              <div class="card-status">未找到用户</div>
              <div class="card-email">${email}</div>
            </div>
            <div class="status-dot"></div>
          </div>
          <div class="card-body">
            <div class="row"><span class="row-label">状态</span><span class="row-value" style="color:var(--ink2)">系统中无此邮箱记录</span></div>
            <div class="row"><span class="row-label">查询时间</span><span class="row-value">${now}</span></div>
          </div>
        </div>`;
      return;
    }

    const initial = getInitial(data.name, data.email);

    if (data.isMember) {
      document.getElementById('result').innerHTML = `
        <div class="card is-member">
          <div class="card-head">
            <div class="avatar">${initial}</div>
            <div class="card-head-info">
              <div class="card-status">✓ 付费会员</div>
              <div class="card-email">${data.email}</div>
            </div>
            <div class="status-dot"></div>
          </div>
          <div class="card-body">
            ${data.name ? `<div class="row"><span class="row-label">姓名</span><span class="row-value">${data.name}</span></div>` : ''}
            ${data.plan ? `<div class="row"><span class="row-label">会员套餐</span><span class="row-value"><span class="plan-pill">${data.plan}</span></span></div>` : ''}
            <div class="row"><span class="row-label">注册时间</span><span class="row-value">${formatDate(data.registeredAt)}</span></div>
            <div class="row"><span class="row-label">查询时间</span><span class="row-value">${now}</span></div>
          </div>
        </div>`;
    } else {
      document.getElementById('result').innerHTML = `
        <div class="card not-member">
          <div class="card-head">
            <div class="avatar">${initial}</div>
            <div class="card-head-info">
              <div class="card-status">非付费会员</div>
              <div class="card-email">${data.email}</div>
            </div>
            <div class="status-dot"></div>
          </div>
          <div class="card-body">
            ${data.name ? `<div class="row"><span class="row-label">姓名</span><span class="row-value">${data.name}</span></div>` : ''}
            <div class="row"><span class="row-label">注册时间</span><span class="row-value">${formatDate(data.registeredAt)}</span></div>
            <div class="row"><span class="row-label">状态</span><span class="row-value" style="color:var(--amber)">已注册，未付费</span></div>
            <div class="row"><span class="row-label">查询时间</span><span class="row-value">${now}</span></div>
          </div>
        </div>`;
    }
  } catch (err) {
    document.getElementById('result').innerHTML = `<div class="err-box">⚠ ${err.message || '查询失败，请检查网络连接'}</div>`;
  }

  document.getElementById('queryBtn').disabled = false;
}
</script>
</body>
</html>
